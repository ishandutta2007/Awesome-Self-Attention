<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#110d26" />
      <stop offset="60%" stop-color="#070514" />
      <stop offset="100%" stop-color="#020105" />
    </radialGradient>

    <!-- Grid Accent Gradient -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00dfd8" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glowing Lines and Node Gradients -->
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7928ca" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00dfd8" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Pulse animations for dynamic/interactive look */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes moveDash {
      to { stroke-dashoffset: -40; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .pulse-node {
      animation: pulse 4s infinite ease-in-out;
    }
    .pulse-node-fast {
      animation: pulse 2.5s infinite ease-in-out;
    }
    .flow-line {
      stroke-dasharray: 10, 30;
      animation: moveDash 2s linear infinite;
    }
    .floating-group {
      animation: float 6s infinite ease-in-out;
    }
    .spinning-group {
      transform-origin: 950px 200px;
      animation: rotateRing 25s linear infinite;
    }
  </style>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <rect width="1200" height="400" fill="url(#gridGrad)" />

  <!-- Decorative Matrix / Dots representing tokens -->
  <g class="pulse-node" opacity="0.3">
    <circle cx="100" cy="80" r="2" fill="#7928ca" />
    <circle cx="200" cy="120" r="1.5" fill="#00dfd8" />
    <circle cx="150" cy="250" r="2" fill="#ff007f" />
    <circle cx="300" cy="320" r="2.5" fill="#7928ca" />
    <circle cx="80" cy="300" r="1.5" fill="#00dfd8" />
  </g>

  <!-- Central Visual: Transformer Attention Weight Grid (Dynamic Concept) -->
  <g class="floating-group">
    <!-- Attention Connection Lines -->
    <line x1="300" y1="200" x2="550" y2="120" stroke="url(#glowPurple)" stroke-width="1.5" opacity="0.4" />
    <line x1="300" y1="200" x2="650" y2="280" stroke="url(#glowCyan)" stroke-width="1.5" opacity="0.4" />
    <line x1="300" y1="200" x2="950" y2="200" stroke="url(#glowPurple)" stroke-width="2" class="flow-line" />
    <line x1="550" y1="120" x2="950" y2="200" stroke="url(#glowCyan)" stroke-width="1" opacity="0.3" />
    <line x1="650" y1="280" x2="950" y2="200" stroke="url(#glowPurple)" stroke-width="1.5" opacity="0.5" />

    <!-- Query/Key/Value Representational Nodes -->
    <!-- Node Q -->
    <g class="pulse-node">
      <circle cx="300" cy="200" r="35" fill="#181336" stroke="#ff007f" stroke-width="2" filter="url(#glow)" />
      <text x="300" y="206" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Q</text>
    </g>

    <!-- Node K -->
    <g class="pulse-node-fast">
      <circle cx="550" cy="120" r="25" fill="#181336" stroke="#00dfd8" stroke-width="2" filter="url(#subtleGlow)" />
      <text x="550" y="126" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">K</text>
    </g>

    <!-- Node V -->
    <g class="pulse-node">
      <circle cx="650" cy="280" r="25" fill="#181336" stroke="#7928ca" stroke-width="2" filter="url(#subtleGlow)" />
      <text x="650" y="286" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">V</text>
    </g>
  </g>

  <!-- Big Concept Core / Output Ring -->
  <g class="spinning-group" opacity="0.6">
    <circle cx="950" cy="200" r="70" fill="none" stroke="url(#glowPurple)" stroke-width="2" stroke-dasharray="10 15 5 10" />
    <circle cx="950" cy="200" r="50" fill="none" stroke="url(#glowCyan)" stroke-width="1.5" stroke-dasharray="4 8" />
  </g>
  
  <g class="floating-group">
    <circle cx="950" cy="200" r="30" fill="#0c0721" stroke="#00dfd8" stroke-width="3" filter="url(#glow)" />
    <polygon points="946,192 958,200 946,208" fill="#ffffff" />
  </g>

  <!-- Title and Description text -->
  <text x="80" y="150" fill="#ffffff" font-family="'Outfit', 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="44" letter-spacing="1">AWESOME</text>
  <text x="80" y="200" fill="url(#glowPurple)" font-family="'Outfit', 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="44" letter-spacing="1">SELF-ATTENTION</text>
  <text x="80" y="240" fill="#a0a0c0" font-family="'Segoe UI', Roboto, sans-serif" font-weight="400" font-size="16" letter-spacing="0.5">A Curated List of Self-Attention Evolution, Variants, &amp; Implementations</text>
</svg>
